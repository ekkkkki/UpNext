name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build core & run tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # Tests depend only on QuickAddCore (pure logic), so they build and run on any
      # macOS runner — the full app target needs the macOS 26 SDK (FoundationModels).
      - name: Run test suite (release)
        run: swift run -c release QuickAddTests
